<!DOCTYPE html>
<html>
<head><title>Generate HackExt Icons</title></head>
<body>
<h2>Right-click each icon and "Save image as..." to the icons/ folder</h2>
<p>icon16.png:</p><canvas id="c16" width="16" height="16"></canvas>
<p>icon48.png:</p><canvas id="c48" width="48" height="48"></canvas>
<p>icon128.png:</p><canvas id="c128" width="128" height="128"></canvas>

<script>
function drawIcon(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.22;

  // Rounded rect background with gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#4F46E5');
  grad.addColorStop(1, '#7C3AED');

  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Subtle inner glow
  const inner = ctx.createRadialGradient(size*0.3, size*0.3, 0, size*0.5, size*0.5, size*0.7);
  inner.addColorStop(0, 'rgba(255,255,255,0.15)');
  inner.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = inner;
  ctx.fill();

  // "C" letter
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${size * 0.55}px -apple-system, "SF Pro Display", "Segoe UI", Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('C', size / 2, size / 2 + size * 0.02);

  // Convert to downloadable image
  const img = new Image();
  img.src = c.toDataURL('image/png');
  img.style.border = '1px solid #ccc';
  img.style.margin = '8px';
  c.parentNode.insertBefore(img, c.nextSibling);

  // Auto download
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `icon${size}.png`;
  a.click();
}

drawIcon('c16', 16);
drawIcon('c48', 48);
drawIcon('c128', 128);
</script>
</body>
</html>
